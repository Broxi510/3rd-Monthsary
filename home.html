<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone-frame">
  <div class="phone-screen ios-home">

    <div class="top-widgets">
      <div class="widget large">
        <p>Our Love story</p>
        <h2 id="days">91 Days</h2>
        <span>since we started</span>
      </div>

      <div class="widget small">
        <p>Happy 3rd Monthsary!</p>
        <span>I loveyou so much</span>
      </div>
    </div>

    <div class="ios-grid">
      <div class="app" onclick="goPage('letter.html')">
        <div class="icon pink">💌</div>
        <p>Letter</p>
      </div>

      <div class="app" onclick="goPage('gallery.html')">
        <div class="icon purple">📸</div>
        <p>Photos</p>
      </div>
    </div>

    <div class="dock">
      <div class="dock-icon" onclick="goPage('letter.html')">💌</div>
      <div class="dock-icon" onclick="goPage('gallery.html')">📸</div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
